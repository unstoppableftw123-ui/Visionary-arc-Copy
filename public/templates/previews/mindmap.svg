  <!-- Center node -->
  <ellipse cx="80" cy="50" rx="22" ry="14" fill="#F3E8FF" stroke="#7C3AED" stroke-width="1.5"/>
  <text x="80" y="47" font-family="Inter, sans-serif" font-size="5.5" fill="#7C3AED" text-anchor="middle" font-weight="600">Main</text>
  <text x="80" y="55" font-family="Inter, sans-serif" font-size="5.5" fill="#7C3AED" text-anchor="middle" font-weight="600">Idea</text>

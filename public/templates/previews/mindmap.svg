  <line x1="58" y1="44" x2="42" y2="30" stroke="#A78BFA" stroke-width="1.25"/>
  <line x1="102" y1="44" x2="118" y2="30" stroke="#A78BFA" stroke-width="1.25"/>
  <line x1="58" y1="56" x2="42" y2="70" stroke="#A78BFA" stroke-width="1.25"/>

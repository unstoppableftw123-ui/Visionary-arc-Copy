  <text x="21" y="68.5" font-family="Inter, sans-serif" font-size="5" fill="#374151">Point 3</text>
  <!-- Right column -->
  <rect x="90" y="18" width="62" height="74" fill="#F0FDF4" stroke="#10B981" stroke-width="1.5" rx="2"/>
  <rect x="90" y="18" width="62" height="16" fill="#D1FAE5" stroke="#10B981" stroke-width="1.5" rx="2"/>
  <rect x="90" y="28" width="62" height="6" fill="#D1FAE5"/>
  <text x="121" y="29" font-family="Inter, sans-serif" font-size="6" fill="#065F46" text-anchor="middle" font-weight="700">Topic B</text>
  <!-- Right bullets -->
  <circle cx="98" cy="44" r="2" fill="#10B981"/>
  <line x1="103" y1="44" x2="146" y2="44" stroke="#A7F3D0" stroke-width="1"/>

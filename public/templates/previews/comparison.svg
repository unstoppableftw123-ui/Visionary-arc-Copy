  <text x="39" y="29" font-family="Inter, sans-serif" font-size="6" fill="#1D4ED8" text-anchor="middle" font-weight="700">Topic A</text>
  <!-- Left bullets -->
  <circle cx="16" cy="44" r="2" fill="#3B82F6"/>
  <line x1="21" y1="44" x2="64" y2="44" stroke="#BFDBFE" stroke-width="1"/>

  <circle cx="98" cy="55" r="2" fill="#10B981"/>
  <line x1="103" y1="55" x2="146" y2="55" stroke="#A7F3D0" stroke-width="1"/>
  <text x="103" y="57.5" font-family="Inter, sans-serif" font-size="5" fill="#374151">Point 2</text>
  <circle cx="98" cy="66" r="2" fill="#10B981"/>
  <line x1="103" y1="66" x2="146" y2="66" stroke="#A7F3D0" stroke-width="1"/>
  <text x="103" y="68.5" font-family="Inter, sans-serif" font-size="5" fill="#374151">Point 3</text>

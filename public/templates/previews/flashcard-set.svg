  <rect x="24" y="18" width="52" height="32" fill="#FCE7F3" stroke="#EC4899" stroke-width="1.5" rx="3"/>
  <text x="50" y="36" font-family="Inter, sans-serif" font-size="5" fill="#EC4899" text-anchor="middle" font-weight="600">A:</text>

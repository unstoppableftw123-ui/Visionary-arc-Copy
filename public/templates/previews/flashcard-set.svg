  <rect x="12" y="12" width="52" height="32" fill="#FFFFFF" stroke="#EC4899" stroke-width="1.5" rx="3"/>
  <text x="38" y="30" font-family="Inter, sans-serif" font-size="5" fill="#EC4899" text-anchor="middle" font-weight="600">Q:</text>
  <!-- Card 2 - back -->
  <rect x="92" y="42" width="52" height="32" fill="#FCE7F3" stroke="#EC4899" stroke-width="1.5" rx="3"/>
  <text x="118" y="60" font-family="Inter, sans-serif" font-size="5" fill="#EC4899" text-anchor="middle" font-weight="600">A:</text>
  <!-- Card 2 - front -->
  <rect x="80" y="36" width="52" height="32" fill="#FFFFFF" stroke="#EC4899" stroke-width="1.5" rx="3"/>
  <text x="106" y="54" font-family="Inter, sans-serif" font-size="5" fill="#EC4899" text-anchor="middle" font-weight="600">Q:</text>
  <!-- Card 3 - back -->
  <rect x="24" y="66" width="52" height="32" fill="#FCE7F3" stroke="#EC4899" stroke-width="1.5" rx="3"/>
  <text x="50" y="84" font-family="Inter, sans-serif" font-size="5" fill="#EC4899" text-anchor="middle" font-weight="600">A:</text>
  <!-- Card 3 - front -->
  <rect x="12" y="60" width="52" height="32" fill="#FFFFFF" stroke="#EC4899" stroke-width="1.5" rx="3"/>
  <text x="38" y="78" font-family="Inter, sans-serif" font-size="5" fill="#EC4899" text-anchor="middle" font-weight="600">Q:</text>
  <!-- Label -->
  <text x="118" y="92" font-family="Inter, sans-serif" font-size="6" fill="#9CA3AF" text-anchor="middle">Flashcard Set</text>
